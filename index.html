<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch4Me - German Grammar Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: #1a1a1a;
            color: white;
            padding: 30px 20px;
            border-bottom: 4px solid #D00000;
            margin-bottom: 30px;
            border-radius: 8px;
            text-align: center;
        }

        header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        header p {
            font-size: 14px;
            color: #FFD700;
        }

        .badge {
            display: inline-block;
            background: #00aa44;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 10px;
        }

        .input-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 12px;
        }

        textarea:focus {
            outline: none;
            border-color: #D00000;
            box-shadow: 0 0 0 2px rgba(208, 0, 0, 0.1);
        }

        .btn-analyze {
            background: #1a1a1a;
            color: #FFD700;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
        }

        .btn-analyze:hover {
            background: #D00000;
            color: white;
        }

        .btn-analyze:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .error {
            background: #ffcccc;
            border: 1px solid #ff4444;
            color: #ff4444;
        }

        .success {
            background: #ccffcc;
            border: 1px solid #44ff44;
            color: #228B22;
        }

        .hidden {
            display: none !important;
        }

        .results {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .score-card {
            background: #FFD700;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .score-number {
            font-size: 36px;
            font-weight: 700;
            color: #000;
        }

        .score-label {
            font-size: 12px;
            font-weight: 600;
            color: #000;
            text-transform: uppercase;
        }

        .score-summary {
            font-size: 14px;
            color: #000;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #ddd;
            margin-bottom: 20px;
            gap: 20px;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 0;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            color: #999;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: #000;
            border-bottom-color: #D00000;
        }

        .tab-content {
            background: #f8f8f8;
            padding: 16px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .tab-content.hidden {
            display: none;
        }

        .issue-card {
            background: white;
            border: 1px solid #ddd;
            border-left: 4px solid #D00000;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        .issue-title {
            font-weight: 600;
            color: #000;
            margin-bottom: 8px;
        }

        .issue-text {
            font-size: 13px;
            color: #555;
            margin-bottom: 12px;
        }

        .rule-box {
            background: #FFD700;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-size: 13px;
            color: #000;
        }

        .example-box {
            background: #f5f5f5;
            padding: 10px;
            border-left: 2px solid #FFD700;
            margin-top: 10px;
            font-size: 12px;
        }

        .no-issues {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 8px;
            color: #999;
        }

        footer {
            text-align: center;
            font-size: 11px;
            color: #999;
            margin-top: 40px;
            padding: 20px;
        }

        mark {
            background: #D00000;
            color: white;
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Deutsch4Me</h1>
            <p>German Grammar Checker for Learners</p>
            <div class="badge">✓ Powered by LanguageTool (Free)</div>
        </header>

        <div class="input-section">
            <label>Paste your German text</label>
            <textarea id="germanText" placeholder="Ich bin gehen zu die Schule morgen..."></textarea>
            <button class="btn-analyze" id="analyzeBtn" onclick="analyzeText()">Analyze Text</button>
        </div>

        <div id="errorMsg" class="message error hidden"></div>
        <div id="successMsg" class="message success hidden"></div>

        <div id="emptyState" class="empty-state">
            <p>Try: "Ich bin gehen zu die Schule"</p>
            <p>Or paste your own German text to check</p>
        </div>

        <div id="resultsSection" class="results hidden">
            <div class="score-card">
                <p class="score-label">Grammar Score</p>
                <p class="score-number" id="scoreNum">85%</p>
                <p class="score-summary" id="summary"></p>
                <p class="score-label" id="issueCount"></p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('text')">Highlighted Text</button>
                <button class="tab-btn" onclick="switchTab('details')">Details</button>
            </div>

            <div id="textTab" class="tab-content"></div>
            <div id="detailsTab" class="tab-content hidden"></div>
        </div>

        <footer>
            <p>Grammar rules powered by LanguageTool (Open Source)</p>
            <p>Completely free • No API key required • No costs</p>
        </footer>
    </div>

    <script>
        // Backend URL - change this when you deploy to Vercel
        const BACKEND_URL = 'https://deutsch4me.vercel.app'; // Local testing
        // For Vercel: 'https://deutsch4me.vercel.app'

        const examples = {
            noun_case: { sentence: 'Der Mann ist groß.', source: 'Goethe', english: 'The man is tall.' },
            article_agreement: { sentence: 'Das ist ein Haus.', source: 'Duden', english: 'That is a house.' },
            verb_conjugation: { sentence: 'Ich gehe zur Schule.', source: 'Deutsche Welle', english: 'I go to school.' },
            adjective_declension: { sentence: 'Ein großer Mann', source: 'Duden', english: 'A tall man' },
            spelling: { sentence: 'Die Schule ist schön.', source: 'Common', english: 'The school is beautiful.' }
        };

        async function analyzeText() {
            const text = document.getElementById('germanText').value.trim();

            if (!text) {
                showError('Please paste some German text');
                return;
            }

            const btn = document.getElementById('analyzeBtn');
            btn.disabled = true;
            btn.textContent = 'Analyzing...';
            hideMessages();

            try {
                const response = await fetch(`${BACKEND_URL}/api/analyze`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Analysis failed');
                }

                const result = await response.json();
                displayResults(result, text);
            } catch (err) {
                showError('Error: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Analyze Text';
            }
        }

        function displayResults(analysis, originalText) {
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');

            document.getElementById('scoreNum').textContent = analysis.overallScore + '%';
            document.getElementById('summary').textContent = analysis.summary;
            document.getElementById('issueCount').textContent = 'Issues: ' + (analysis.issues?.length || 0);

            let highlighted = originalText;
            (analysis.issues || []).forEach(issue => {
                const regex = new RegExp(`\\b${issue.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`, 'gi');
                highlighted = highlighted.replace(regex, `<mark>${issue.word}</mark>`);
            });
            document.getElementById('textTab').innerHTML = `<div style="white-space: pre-wrap; font-family: monospace;">${highlighted}</div>`;

            let detailsHTML = '';
            if (!analysis.issues || analysis.issues.length === 0) {
                detailsHTML = '<p class="no-issues">No grammar issues found! ✓</p>';
            } else {
                (analysis.issues || []).forEach((issue, i) => {
                    const categoryKey = issue.category || 'noun_case';
                    const example = examples[categoryKey];
                    
                    detailsHTML += `
                        <div class="issue-card">
                            <p class="issue-title">${i + 1}. ${issue.category.replace(/_/g, ' ').toUpperCase()}</p>
                            <p class="issue-text"><strong>Found:</strong> "${issue.currentForm}" → <strong>Should be:</strong> "${issue.correctForm}"</p>
                            <div class="rule-box"><strong>Explanation:</strong> ${issue.explanation}</div>
                            ${example ? `<div class="example-box"><strong>Example:</strong> ${example.sentence}<br><em>${example.english}</em></div>` : ''}
                        </div>
                    `;
                });
            }
            document.getElementById('detailsTab').innerHTML = detailsHTML;
            switchTab('text');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));

            if (tab === 'text') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('textTab').classList.remove('hidden');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('detailsTab').classList.remove('hidden');
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function hideMessages() {
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('successMsg').classList.add('hidden');
        }
    </script>
</body>
</html>
